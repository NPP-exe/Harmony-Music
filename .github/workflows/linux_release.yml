name: Linux Release Build

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build-linux-release:
    name: Build Linux deb and optional AppImage
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: 3.24.2

      - name: Setup Java 17
        uses: actions/setup-java@v3
        with:
          distribution: temurin
          java-version: 17

      - name: Enable Linux desktop support
        run: flutter config --enable-linux-desktop

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            bash \
            dash \
            libayatana-appindicator3-dev \
            libgtk-3-dev \
            libfuse2 \
            pkg-config \
            wget
          sudo ln -sf /bin/dash /usr/bin/sh

      - name: Install Flutter dependencies
        run: flutter pub get

      - name: Build Linux release bundle
        run: flutter build linux --release

      - name: Install flutter_distributor
        run: |
          dart pub global activate flutter_distributor
          echo "$HOME/.pub-cache/bin" >> "$GITHUB_PATH"

      - name: Install AppImage tool
        run: |
          wget -q https://github.com/AppImage/AppImageKit/releases/download/13/obsolete-appimagetool-x86_64.AppImage -O /tmp/appimagetool.AppImage
          chmod +x /tmp/appimagetool.AppImage
          sudo mv /tmp/appimagetool.AppImage /usr/local/bin/appimagetool

      - name: Package Debian build
        run: flutter_distributor package --platform linux --targets deb

      - name: Package AppImage build
        continue-on-error: true
        run: flutter_distributor package --platform linux --targets appimage

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: harmony-music-linux-artifacts
          path: |
            dist/**/*.deb
            dist/**/*.AppImage
